controller_manager:
  ros__parameters:
    update_rate: 100
    mecanum_drive_controller:
      type: mecanum_drive_controller/MecanumDriveController
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

mecanum_drive_controller:
  ros__parameters:
    front_left_wheel_name:   front_left_wheel_joint
    front_right_wheel_name:  front_right_wheel_joint
    rear_left_wheel_name:    rear_left_wheel_joint
    rear_right_wheel_name:   rear_right_wheel_joint
    wheel_radius:            0.050
    wheel_separation_x:      0.300   # front-to-rear distance between wheel centers
    wheel_separation_y:      0.340   # left-to-right distance between wheel centers
    cmd_vel_timeout:         0.5
    publish_rate:            50.0
    use_stamped_vel:         false
    linear/x/max_velocity:   0.5
    linear/y/max_velocity:   0.5
    angular/z/max_velocity:  2.0
